<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마법사 키우기 - 잿더미의 연대기</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="ribbon">
    <div>파일(F) &nbsp;&nbsp; 홈(H) &nbsp;&nbsp; 시스템(S) &nbsp;&nbsp; 옵션(O)</div>
    <div>
        <button onclick="saveGame()" class="ribbon-btn">데이터 저장(Save)</button>
        <button onclick="resetGame()" class="ribbon-btn" style="border-color:#ff5a5a; color:#ffdddd;">초기화(Reset)</button>
    </div>
</div>
<div id="formula-bar">
    <span style="color: #666; font-weight: bold; margin-right: 10px;">fx</span>
    <input type="text" id="formula-input" readonly value="=SYSTEM_READY()">
</div>

<div id="workspace">
    <div id="sidebar-data">
        <div id="fixed-profile">
            <table>
                <tr><th colspan="2" class="th-green">Mage_Profile</th></tr>
                <tr><td>무기/방어구</td><td id="eq-main" class="stat-val">없음 / 없음</td></tr>
                <tr><td>서클 / 레벨</td><td class="stat-val"><span id="ui-circle">0</span>C / <span id="ui-level">1</span>Lv</td></tr>
                <tr><td>생존 일수</td><td id="ui-day" class="stat-val">1 Day</td></tr>
                <tr><td>경험치 (EXP)</td><td><div class="cell-bar-container"><div id="exp-fill" class="cell-bar-fill" style="background:#ffd700;"></div></div></td></tr>
                <tr><td>체력 (ST)</td><td><div class="cell-bar-container"><div id="st-fill" class="cell-bar-fill" style="background:#4caf50;"></div></div></td></tr>
                <tr><td>생명력 (HP)</td><td><div class="cell-bar-container"><div id="hp-fill" class="cell-bar-fill" style="background:#ff5a5a;"></div></div></td></tr>
                <tr><td>마나 (MP)</td><td><div class="cell-bar-container"><div id="mana-fill" class="cell-bar-fill" style="background:#5a5aff;"></div></div></td></tr>
                <tr><td>연구P / 골드</td><td class="stat-val"><span id="ui-res">0</span>P / <span id="ui-gold">0</span>G</td></tr>
            </table>
        </div>
        <div id="scrollable-tabs">
            <div class="tab-btn-group">
                <button id="btn-spells" class="tab-btn active" onclick="switchTab('spells')">마법</button>
                <button id="btn-inventory" class="tab-btn" onclick="switchTab('inventory')">가방</button>
                <button id="btn-mastery" class="tab-btn" onclick="switchTab('mastery')">숙련</button>
            </div>
            <div id="tab-content"></div>
        </div>
    </div>
    <div id="main-view">
        <div id="log-area"></div>
        <div id="action-grid"></div>
    </div>
</div>

<div id="start-overlay">
    <div id="intro-box">
        <h2 style="color: var(--excel-green); margin: 0; font-size: 24px;">마법사 키우기</h2>
        <p style="font-size: 14px; line-height: 1.8; color: #444; text-align: left; margin-top:20px;">
            <b>[v3.0 시스템 모듈화 완료]</b><br>
            파일이 너무 커져 발생하던 논리 오류를 원천 차단하기 위해<br>
            HTML, CSS, JS를 분리하고 구조를 재설계했습니다.<br>
            이제 버그 없이 온전히 연대기에 집중하실 수 있습니다.
        </p>
        <button class="excel-btn" style="width:100%; text-align:center; font-weight:bold; border-color:var(--excel-green); margin-top:20px;" onclick="startGame()">새로운 운명 시작</button>
        <button id="load-btn" class="excel-btn" style="display:none; width:100%; text-align:center; margin-top:10px;" onclick="loadGame()">기존 기록 불러오기</button>
    </div>
</div>

<!-- 스크립트 분리 로드 -->
<script src="js/data.js"></script>
<script src="js/engine.js"></script>

</body>
</html>
